<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>s7abow | مطور وبات وتساب</title>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Google Fonts: Arabic + English -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* فيديو الخلفية (الخلفية) */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
        }

        /* طبقة شفافة داكنة فوق الفيديو عشان النص يبان بوضوح */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.65);
            z-index: -1;
        }

        body {
            font-family: 'Cairo', sans-serif;
            color: #eef5ff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem 1.5rem;
            position: relative;
        }

        /* البطاقة الرئيسية */
        .portfolio-card {
            max-width: 560px;
            width: 100%;
            background: rgba(18, 25, 45, 0.7);
            backdrop-filter: blur(14px);
            border-radius: 3rem;
            border: 1px solid rgba(72, 187, 255, 0.25);
            box-shadow: 0 25px 45px -12px rgba(0,0,0,0.6), 0 0 0 1px rgba(0,255,255,0.05);
            overflow: hidden;
            transition: transform 0.25s ease;
        }

        .portfolio-card:hover {
            transform: translateY(-6px);
        }

        /* صورة المطور */
        .avatar-section {
            text-align: center;
            padding-top: 2rem;
        }
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #7ce4ff;
            box-shadow: 0 0 20px rgba(0, 200, 255, 0.4);
            transition: 0.2s;
        }
        .avatar:hover {
            transform: scale(1.02);
            box-shadow: 0 0 28px rgba(0, 220, 255, 0.6);
        }

        .header-glow {
            background: transparent;
            padding: 0.75rem 1.8rem 1.5rem;
            text-align: center;
        }

        .badge-dev {
            display: inline-block;
            background: rgba(0, 255, 255, 0.12);
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: #7ce4ff;
            border: 1px solid rgba(0, 255, 255, 0.45);
            backdrop-filter: blur(4px);
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(120deg, #ffffff, #7ac7ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .sub-role {
            font-size: 1.1rem;
            font-weight: 500;
            color: #cae3ff;
            background: rgba(255,255,255,0.05);
            display: inline-block;
            padding: 0.25rem 1.2rem;
            border-radius: 60px;
            margin-top: 0.4rem;
        }

        .fullstack-tagline {
            text-align: center;
            margin-top: 1rem;
            font-size: 0.95rem;
            font-weight: 500;
            color: #b4d0ff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            flex-wrap: wrap;
        }

        .fullstack-tagline i {
            color: #5bc0ff;
        }

        /* أزرار التواصل */
        .social-row {
            display: flex;
            justify-content: center;
            gap: 2rem;
            margin: 1.6rem 0 1rem;
            flex-wrap: wrap;
        }

        .contact-btn {
            background: rgba(15, 25, 45, 0.85);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            padding: 0.7rem 1.9rem;
            display: inline-flex;
            align-items: center;
            gap: 0.7rem;
            font-weight: 700;
            font-size: 1rem;
            border: 1px solid rgba(100, 200, 255, 0.4);
            transition: all 0.2s;
            color: #eef5ff;
            text-decoration: none;
        }

        .contact-btn i {
            font-size: 1.25rem;
        }

        .contact-btn.telegram:hover {
            background: #1f6f8f;
            border-color: #7ad0ff;
            box-shadow: 0 0 12px rgba(0, 180, 255, 0.3);
        }

        .contact-btn.whatsapp:hover {
            background: #1f8f4e;
            border-color: #6bffb0;
            box-shadow: 0 0 12px rgba(43, 255, 132, 0.2);
        }

        /* المهارات */
        .skills-section {
            padding: 1.6rem 1.8rem;
            border-bottom: 1px solid rgba(72, 187, 255, 0.2);
        }

        .section-title {
            font-size: 1.2rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            margin-bottom: 1.2rem;
            color: #d6f0ff;
        }

        .section-title i {
            font-size: 1.3rem;
            color: #5bc0ff;
        }

        .skills-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.9rem;
        }

        .skill-pill {
            background: rgba(0, 30, 50, 0.7);
            backdrop-filter: blur(4px);
            padding: 0.5rem 1.3rem;
            border-radius: 40px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            border: 1px solid rgba(0, 255, 255, 0.25);
            transition: all 0.2s;
            font-size: 0.95rem;
        }

        .skill-pill i {
            font-size: 1.1rem;
            color: #7ad0ff;
        }

        .skill-pill:hover {
            background: #0c2a42;
            border-color: #5bc0ff;
            transform: scale(1.02);
        }

        /* قناة التليجرام */
        .channel-section {
            padding: 1.6rem 1.8rem 2rem;
            text-align: center;
        }

        .channel-box {
            background: linear-gradient(125deg, #0e1a2e, #091222);
            border-radius: 2rem;
            padding: 1.5rem 1rem;
            border: 1px solid rgba(0, 230, 250, 0.35);
            transition: 0.2s;
        }

        .channel-icon {
            font-size: 2.2rem;
            color: #57c7ff;
            margin-bottom: 0.7rem;
        }

        .channel-box h3 {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #fff, #a0e0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .channel-desc {
            font-size: 0.85rem;
            color: #bbd4ff;
            margin-bottom: 1.2rem;
        }

        .channel-link {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: rgba(0, 255, 255, 0.08);
            padding: 0.7rem 1.6rem;
            border-radius: 60px;
            text-decoration: none;
            color: #cdf2ff;
            font-weight: 600;
            border: 1px solid #2ea0c0;
            transition: 0.2s;
        }

        .channel-link:hover {
            background: #1c6e8c;
            color: white;
            border-color: #7ae9ff;
            box-shadow: 0 5px 15px rgba(0,150,200,0.2);
        }

        .footer-note {
            text-align: center;
            padding: 1rem;
            font-size: 0.7rem;
            color: #7c9ed6;
            border-top: 1px solid rgba(72, 187, 255, 0.15);
            background: rgba(0,0,0,0.2);
        }

        @media (max-width: 480px) {
            .portfolio-card {
                border-radius: 2rem;
            }
            .contact-btn {
                padding: 0.5rem 1.3rem;
                font-size: 0.85rem;
            }
            h1 {
                font-size: 2rem;
            }
            .skills-grid {
                gap: 0.65rem;
            }
            .skill-pill {
                padding: 0.4rem 1rem;
                font-size: 0.85rem;
            }
            .avatar {
                width: 95px;
                height: 95px;
            }
        }
    </style>
</head>
<body>
